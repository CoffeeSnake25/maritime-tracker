<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Maritime Vessel Tracker POC</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQWoVgRxc3pN8tC3tARwQnHRw34pWVE="
      crossorigin=""
    >
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <aside class="panel">
        <header>
          <h1>Maritime Vessel Tracker</h1>
          <p id="summary">Loading vessels...</p>
        </header>

        <div class="controls">
          <input id="search" type="search" placeholder="Search name or MMSI" autocomplete="off">
          <select id="cargoFilter">
            <option value="">All cargo types</option>
          </select>
          <select id="statusFilter">
            <option value="">All navigation statuses</option>
          </select>
          <button id="refresh" type="button">Refresh</button>
        </div>

        <div class="meta">
          <span id="provider"></span>
          <span id="lastRefresh"></span>
        </div>
        <p id="warning" class="warning" hidden></p>

        <ol id="vesselList" class="vessel-list"></ol>
      </aside>

      <section class="map-area" aria-label="Vessel map area">
        <div id="map" aria-label="Vessel map"></div>
        <div class="map-action-bar" aria-label="Map tools">
          <div class="map-tool-group">
            <label class="map-tool-button map-tool-toggle">
              <input id="coordsToggle" type="checkbox">
              <span>Cursor coords</span>
            </label>
            <span id="cursorCoords" class="coordinate-readout" hidden></span>
          </div>
          <div class="map-tool-group">
            <button id="drawBox" type="button" class="map-tool-button">Draw box</button>
            <button id="applyBox" type="button" class="map-tool-button map-tool-button-primary" hidden disabled>Apply area</button>
            <button id="clearBox" type="button" class="map-tool-button map-tool-button-subtle" hidden disabled>Clear box</button>
          </div>
          <span id="boxSummary" class="bbox-readout" hidden></span>
          <span id="drawHint" class="map-tool-hint" hidden>Drag on map to draw area</span>
        </div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      window.MARITIME_TRACKER_CONFIG = {{ app_config|tojson }};
    </script>
    <script src="/static/app.js"></script>
  </body>
</html>
